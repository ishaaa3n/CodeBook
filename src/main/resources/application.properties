# App
spring.application.name=notebook-app

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/notebookdb?TimeZone=UTC
spring.datasource.username=admin
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.password=admin123

# JPAy

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# auth
# Google OAuth
spring.security.oauth2.client.registration.google.scope=email,profile

spring.profiles.active=local

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=admin123


# Queue config
rabbitmq.queue.execution=execution.queue
rabbitmq.exchange=execution.exchange
rabbitmq.routing.key=execution.routing.key

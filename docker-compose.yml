services:
  postgres:
    image: postgres:15
    container_name: notebook_postgres
    environment:
      POSTGRES_DB: notebookdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: notebook_redis
    ports:
      - "6379:6379"